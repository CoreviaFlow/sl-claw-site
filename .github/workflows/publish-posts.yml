name: Publish blog posts (drip)

# Дрип-публикация SEO-постов: 3 захода в сутки, чтобы посты выходили порциями
# (не все сразу), а не одной пачкой. Каждый пост имеет своё время (publishAt);
# publish.js публикует только «дозревшие» по времени.
# Времена UTC → Киев (лето EEST, UTC+3): 09:00→12:00 (день), 16:00→19:00 (вечер), 23:00→02:00 (ночь).
# Можно запустить вручную через "Run workflow" (workflow_dispatch).
on:
  schedule:
    - cron: '0 9,16,23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: publish-posts
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish due posts
        run: node publish.js

      - name: Commit & push if changed
        id: commit
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Нет изменений — публиковать нечего."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "sl-claw-bot"
          git config user.email "no-reply@sl-claw.tech"
          git add -A
          git commit -m "chore(blog): дрип-публикация постов $(date -u +%Y-%m-%d)"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Coolify redeploy
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -fsS -X POST \
            "https://deploy-pro.coreviaflow.space/api/v1/deploy?uuid=d8p5bshpekutxt15d6w5ee4y&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
          echo "Deploy triggered."
