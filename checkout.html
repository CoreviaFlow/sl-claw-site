<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="google-site-verification" content="513RYJQimjNBKuWqsZH8qfEB5tvn4ET6DFjHIXxSPeg">
<title>Оформление заказа — SL-CLAW</title>
<meta name="description" content="Оформление заказа AI-продавца SL-CLAW. Оплата Visa/Mastercard.">
<link rel="canonical" href="https://sl-claw.tech/checkout.html">
<meta name="robots" content="noindex,follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=2">
<link rel="icon" href="favicon.ico?v=2" sizes="any">
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
<link rel="stylesheet" href="styles.css?v=3">
<script src="/analytics.js" defer></script>
</head>
<body>
<header class="nav"><div class="wrap row">
  <a class="logo" href="index.html">SL<b>_</b>CLAW</a>
  <nav>
    <a href="catalog.html" data-i18n="nav.catalog">Каталог ниш</a>
    <a href="pricing.html" data-i18n="nav.pricing">Тарифы</a>
    <a href="index.html#how" data-i18n="nav.how">Как это работает</a>
    <a href="https://app.sl-claw.tech" target="_blank" rel="noopener" data-i18n="nav.cabinet">Кабинет ↗</a>
  </nav>
</div></header>

<section class="wrap"><div class="checkout">
  <div class="crumb"><a href="pricing.html" id="cocrumbT">тарифы</a> / <span id="cocrumbC">оформление</span></div>
  <h1 id="cohead">Оформление заказа</h1>

  <div class="co-grid">
    <div class="co-summary" id="summary"><!-- JS --></div>

    <div class="co-form">
      <label class="co-field">
        <span class="co-lbl" id="emaillbl">Email <i>для доступа и чека</i></span>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email" inputmode="email">
        <small id="emailhint">На него придёт доступ к репозиторию бота и чек об оплате.</small>
      </label>

      <label class="co-field">
        <span class="co-lbl" id="phonelbl">Телефон <i>для связи</i></span>
        <input type="tel" id="phone" placeholder="+380 __ ___ __ __" autocomplete="tel" inputmode="tel">
        <small id="phonehint">Менеджер свяжется при необходимости и поможет с запуском.</small>
      </label>

      <label class="co-agree"><input type="checkbox" id="agree">
        <span id="agreetxt">Я согласен с <a href="oferta.html" target="_blank" rel="noopener">публичной офертой</a> и <a href="privacy.html" target="_blank" rel="noopener">политикой конфиденциальности</a>.</span>
      </label>

      <button class="btn btn-primary co-pay" id="pay">Оплатить картой →</button>
      <div id="coerr" class="co-err" style="display:none"></div>
      <div class="co-secure" id="coguar" style="margin-top:10px"></div>

      <div class="co-secure" id="cosecure">
        Оплата картами Visa / Mastercard через Monobank. Данные карты вводятся на стороне банка — мы их не получаем.
        <span class="pay-badges" id="cobadges"></span>
      </div>
      <div class="co-secure" id="cogeo" style="margin-top:8px">Услуги недоступны для резидентов рф и рб.</div>
      <div id="coimpl" style="margin-top:16px;padding:14px 16px;border:1px solid #cdebd9;background:#f0faf4;border-radius:14px;font-size:13.5px;line-height:1.55;color:#0f5132"></div>
    </div>
  </div>
</div></section>

<footer class="foot-site"></footer>

<script src="niches.js"></script>
<script src="i18n.js"></script>
<script>
(function(){
  var LANG = window.LANG || 'ru';
  var uk = LANG === 'uk';

  // ── Двуязычные строки checkout (RU/UK) ──
  var TX = uk ? {
    title:'Оформлення замовлення — SL-CLAW', crumbT:'тарифи', crumbC:'оформлення', h1:'Оформлення замовлення',
    emaillbl:'Email <i>для доступу та чека</i>',
    emailhint:'На нього прийде доступ до репозиторію бота і чек про оплату.',
    phonelbl:'Телефон <i>для звʼязку</i>',
    phonehint:'Менеджер звʼяжеться за потреби та допоможе із запуском.',
    errPhone:'Вкажіть телефон для звʼязку.',
    agree:'Я погоджуюсь з <a href="oferta.html" target="_blank" rel="noopener">публічною офертою</a> та <a href="privacy.html" target="_blank" rel="noopener">політикою конфіденційності</a>.',
    pay:'Сплатити карткою →', payGo:'Перехід до оплати…',
    secure:'Оплата картками Visa / Mastercard через Monobank. Дані картки вводяться на стороні банку — ми їх не отримуємо.',
    geo:'Послуги недоступні для резидентів рф та рб.',
    order:'замовлення', nodisc:'Без знижки', sale:'За акцією', price:'Ціна', typeLbl:'Тип', typeVal:'разовий платіж · бот назавжди',
    save:'Економія', prodPrefix:'AI-продавець: ',
    guarantee:'Разова оплата — бот залишається у вас назавжди. Повернення та умови — у <a href="payment-refund.html" target="_blank" rel="noopener">розділі «Оплата та повернення»</a>.',
    impl:'<b>Потрібно більше?</b> Після оплати можна доплатити й замовити <b>індивідуальне впровадження «під ключ»</b> у ваш бізнес — налаштування під процеси, інтеграції та навчання команди. Вартість послуги — <b>від $2000</b>.',
    errEmail:'Введіть коректний email — на нього прийде доступ і чек.', errAgree:'Підтвердіть згоду з офертою та політикою конфіденційності.'
  } : {
    title:'Оформление заказа — SL-CLAW', crumbT:'тарифы', crumbC:'оформление', h1:'Оформление заказа',
    emaillbl:'Email <i>для доступа и чека</i>',
    emailhint:'На него придёт доступ к репозиторию бота и чек об оплате.',
    phonelbl:'Телефон <i>для связи</i>',
    phonehint:'Менеджер свяжется при необходимости и поможет с запуском.',
    errPhone:'Укажите телефон для связи.',
    agree:'Я согласен с <a href="oferta.html" target="_blank" rel="noopener">публичной офертой</a> и <a href="privacy.html" target="_blank" rel="noopener">политикой конфиденциальности</a>.',
    pay:'Оплатить картой →', payGo:'Переход к оплате…',
    secure:'Оплата картами Visa / Mastercard через Monobank. Данные карты вводятся на стороне банка — мы их не получаем.',
    geo:'Услуги недоступны для резидентов рф и рб.',
    order:'заказ', nodisc:'Без скидки', sale:'По акции', price:'Цена', typeLbl:'Тип', typeVal:'разовый платёж · бот навсегда',
    save:'Экономия', prodPrefix:'AI-продавец: ',
    guarantee:'Разовая оплата — бот остаётся у вас навсегда. Возврат и условия — в <a href="payment-refund.html" target="_blank" rel="noopener">разделе «Оплата и возврат»</a>.',
    impl:'<b>Нужно больше?</b> После оплаты можно доплатить и заказать <b>индивидуальное внедрение «под ключ»</b> в ваш бизнес — настройка под процессы, интеграции и обучение команды. Стоимость услуги — <b>от $2000</b>.',
    errEmail:'Введите корректный email — на него придёт доступ и чек.', errAgree:'Подтвердите согласие с офертой и политикой конфиденциальности.'
  };

  document.title = TX.title;
  function setHTML(id,v){ var e=document.getElementById(id); if(e) e.innerHTML=v; }
  setHTML('cocrumbT',TX.crumbT); setHTML('cocrumbC',TX.crumbC); setHTML('cohead',TX.h1);
  setHTML('emaillbl',TX.emaillbl); setHTML('emailhint',TX.emailhint); setHTML('agreetxt',TX.agree);
  setHTML('phonelbl',TX.phonelbl); setHTML('phonehint',TX.phonehint);
  setHTML('pay',TX.pay); setHTML('cogeo',TX.geo); setHTML('coimpl',TX.impl); setHTML('coguar',TX.guarantee);
  setHTML('cosecure', TX.secure + '<span class="pay-badges" id="cobadges"></span>');

  var P = new URLSearchParams(location.search);
  var tier = (P.get('tier')||'Std');
  var TK = {lite:'Lite',std:'Std',standard:'Std',pro:'Pro',core:'Lite','core-study':'Std','core-study-pro':'Pro'};
  tier = TK[tier.toLowerCase()] || (['Lite','Std','Pro'].indexOf(tier)>=0?tier:'Std');
  var nicheSlug = (P.get('niche')||'').toLowerCase();

  var TIER_NAME = uk ? {
    Lite:{t:'Core', s:'рушій-продавець «baby»', inc:'ядро + персона, живий діалог у всіх каналах'},
    Std :{t:'Core + Study', s:'зі школою продажів', inc:'+ методологія продажів (SPIN, MEDDPICC, заперечення)'},
    Pro :{t:'Core + Study + Professional', s:'експерт ніші', inc:'+ професійна експертиза ніші (ринок, цифри, угоди)'}
  } : {
    Lite:{t:'Core', s:'движок-продавец «baby»', inc:'ядро + персона, живой диалог во всех каналах'},
    Std :{t:'Core + Study', s:'со школой продаж', inc:'+ методология продаж (SPIN, MEDDPICC, возражения)'},
    Pro :{t:'Core + Study + Professional', s:'эксперт ниши', inc:'+ профессиональная экспертиза ниши (рынок, цифры, сделки)'}
  };
  var pr = (window.PROMO && window.PROMO.prices[tier]) || {price:''};
  var onSale = !!(pr.sale && window.promoActive && window.promoActive());

  var prodTitle, prodSub, refNiche;
  var n = nicheSlug && window.NICHES ? window.NICHES.niches.find(function(x){return x.slug===nicheSlug;}) : null;
  if (n){
    prodTitle = TX.prodPrefix + (typeof trN==='function'?trN(n,'name'):n.name);
    prodSub = TIER_NAME[tier].t + ' · ' + TIER_NAME[tier].s;
    refNiche = n.slug;
  } else {
    prodTitle = TIER_NAME[tier].t;
    prodSub = TIER_NAME[tier].s;
    refNiche = {Lite:'core',Std:'core-study',Pro:'core-study-pro'}[tier];
  }

  var priceNow = onSale ? pr.sale : pr.price;
  document.getElementById('summary').innerHTML =
    '<div class="co-prod">'+
      '<div class="co-tag">'+TX.order+'</div>'+
      '<div class="co-name">'+prodTitle+'</div>'+
      '<div class="co-sub">'+prodSub+'</div>'+
      '<div class="co-inc">'+TIER_NAME[tier].inc+'</div>'+
    '</div>'+
    '<div class="co-pricebox">'+
      (onSale?'<div class="co-pl"><span>'+TX.nodisc+'</span><s>'+pr.price+'</s></div>':'')+
      '<div class="co-pl big"><span>'+(onSale?(TX.sale+' −'+pr.off+'%'):TX.price)+'</span><b>'+priceNow+'</b></div>'+
      (onSale?'<div class="co-pl save"><span>'+TX.save+'</span><b>−'+pr.off+'%</b></div>':'')+
      '<div class="co-pl muted"><span>'+TX.typeLbl+'</span><span>'+TX.typeVal+'</span></div>'+
    '</div>';

  document.getElementById('cobadges').innerHTML =
    '<svg class="pay-ic" viewBox="0 0 48 30" xmlns="http://www.w3.org/2000/svg"><rect width="47" height="29" x="0.5" y="0.5" rx="4" fill="#fff" stroke="#e6e8ec"/><text x="24" y="20" text-anchor="middle" font-family="Arial" font-weight="700" font-style="italic" font-size="12" fill="#1A1F71">VISA</text></svg>'+
    '<svg class="pay-ic" viewBox="0 0 48 30" xmlns="http://www.w3.org/2000/svg"><rect width="47" height="29" x="0.5" y="0.5" rx="4" fill="#fff" stroke="#e6e8ec"/><circle cx="20" cy="15" r="7.5" fill="#EB001B"/><circle cx="28" cy="15" r="7.5" fill="#F79E1B"/><path d="M24 9.7a7.5 7.5 0 010 10.6 7.5 7.5 0 010-10.6z" fill="#FF5F00"/></svg>';

  function showErr(m){ var e=document.getElementById('coerr'); e.textContent=m; e.style.display='block'; }
  document.getElementById('pay').onclick = function(){
    var email = (document.getElementById('email').value||'').trim();
    var ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    if(!ok){ showErr(TX.errEmail); document.getElementById('email').focus(); return; }
    var phone = (document.getElementById('phone').value||'').trim();
    if(phone.replace(/[^0-9]/g,'').length < 7){ showErr(TX.errPhone); document.getElementById('phone').focus(); return; }
    if(!document.getElementById('agree').checked){ showErr(TX.errAgree); return; }
    // лид → CRM «It цифра» (через бэкенд pay /lead, который форвардит в CRM)
    try { fetch('https://pay.sl-claw.tech/lead', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email:email, phone:phone, niche:refNiche, tier:tier, price:String(priceNow), lang:LANG, source:'checkout', url:location.href }),
      keepalive:true }).catch(function(){}); } catch(e){}
    // FB InitiateCheckout (Pixel + CAPI) перед редіректом на оплату
    var icValue = parseFloat(String(priceNow).replace(/[^0-9.]/g,'')) || 0;
    if (typeof window.slclawTrack === 'function') {
      try { window.slclawTrack('InitiateCheckout', {
        content_type:'product', content_ids:[refNiche], content_category:tier,
        value: icValue, currency:'USD'
      }, { email: email }); } catch(e){}
    }
    var url = 'https://pay.sl-claw.tech/create?tier='+encodeURIComponent(tier)
            + '&niche='+encodeURIComponent(refNiche)
            + '&email='+encodeURIComponent(email)
            + '&phone='+encodeURIComponent(phone);
    // проброс атрибуції щоб Monobank-webhook міг віддати Purchase у FB
    if (typeof window.slclawPayParams === 'function') {
      var extra = window.slclawPayParams();
      if (extra) url += '&' + extra;
    }
    document.getElementById('pay').textContent = TX.payGo;
    document.getElementById('pay').disabled = true;
    location.href = url;
  };
  document.getElementById('email').addEventListener('keydown',function(e){ if(e.key==='Enter') document.getElementById('pay').click(); });
})();
</script>
</body>
</html>
