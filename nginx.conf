server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Относительные редиректы → не сбрасывают https за edge-прокси
  # (фикс: trailing-slash раньше уводил на http://)
  absolute_redirect off;

  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # Заголовки безопасности. ВАЖНО: в location ниже используется `expires`, а не
  # `add_header`, иначе nginx сбросил бы наследование этих заголовков в location.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # HSTS — defense-in-depth (edge тоже должен его ставить, но дублируем здесь):
  # max-age=2 года + includeSubDomains; preload — НЕ ставим до подачи в hstspreload.org
  # потому что preload необратим (если потом захотим http-поддомен — будет проблема).
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  # CSP — whitelist для реально используемых внешних источников (Meta Pixel, GA4, Umami, CAPI).
  # 'unsafe-inline' необходим — analytics.js использует inline инициализацию Pixel/GA4,
  # а niche.html/catalog.html содержат inline onclick handlers (legacy, переписать = отдельная задача).
  # При добавлении новых external scripts (например YM, hotjar) — обновить script-src/connect-src.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://connect.facebook.net https://www.googletagmanager.com https://umami.coreviaflow.space; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' https: data:; connect-src 'self' https://events.coreviaflow.space https://umami.coreviaflow.space https://www.google-analytics.com https://stats.g.doubleclick.net https://app.sl-claw.tech https://pay.sl-claw.tech; frame-src 'self' https://www.facebook.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://pay.sl-claw.tech https://t.me" always;

  # www → без www (канонический хост)
  if ($host = www.sl-claw.tech) { return 301 https://sl-claw.tech$request_uri; }

  # Гео /asia/ (ru-KZ) выведено — рынок KZ/UZ переедет на отдельный субдомен.
  # 301 на ru-UA (/n/), чтобы не терять индекс и не плодить 404.
  location ~ ^/asia/(.*)$ { return 301 https://sl-claw.tech/n/$1; }

  # HTML и чистые URL: ревалидировать (без залипания старого HTML)
  # Несуществующие пути → честный 404, а не главная с 200 (фикс soft-404:
  # /demo.html, /about.html, /faq.html и любые фантомные URL больше не дублируют главную)
  location / {
    try_files $uri $uri.html $uri/ =404;
    expires -1;
  }

  # CSS/JS: ревалидировать (без залипания стилей на телефоне)
  location ~* \.(?:css|js)$ { expires -1; }

  # Картинки/шрифты/иконки: кэш надолго (их URL стабильны)
  location ~* \.(?:png|jpe?g|gif|svg|ico|webp|avif|woff2?|ttf|otf)$ { expires 30d; }
}
