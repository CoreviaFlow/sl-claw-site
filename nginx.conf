server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Гео /asia/ (ru-KZ) выведено — рынок KZ/UZ переедет на отдельный субдомен.
  # 301 на ru-UA (/n/), чтобы не терять индекс и не плодить 404.
  location ~ ^/asia/(.*)$ { return 301 https://sl-claw.tech/n/$1; }

  # HTML и чистые URL (каталоги → index.html): всегда ревалидировать,
  # чтобы не залипал старый HTML/CSS (причина «нет дизайна на телефоне»)
  location / {
    try_files $uri $uri.html $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # CSS/JS: ревалидировать по ETag (исключает залипание старых стилей)
  location ~* \.(?:css|js)$ {
    add_header Cache-Control "no-cache";
  }

  # Картинки/шрифты/иконки: кэш надолго (их URL стабильны)
  location ~* \.(?:png|jpe?g|gif|svg|ico|webp|avif|woff2?|ttf|otf)$ {
    add_header Cache-Control "public, max-age=2592000";
  }
}
