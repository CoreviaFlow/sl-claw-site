server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Относительные редиректы → не сбрасывают https за edge-прокси
  # (фикс: trailing-slash раньше уводил на http://)
  absolute_redirect off;

  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # Заголовки безопасности. ВАЖНО: в location ниже используется `expires`, а не
  # `add_header`, иначе nginx сбросил бы наследование этих заголовков в location.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # HSTS — defense-in-depth (edge тоже должен его ставить, но дублируем здесь):
  # max-age=2 года + includeSubDomains; preload — НЕ ставим до подачи в hstspreload.org
  # потому что preload необратим (если потом захотим http-поддомен — будет проблема).
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  # CSP управляется хост-nginx через snippet `/etc/nginx/snippets/sl-claw-security.conf`
  # (на corevia-vps). Здесь НЕ дублируем — иначе браузер применяет intersection двух CSP
  # и блокирует то, что разрешено в одном, но не в другом (FB Pixel, framing и т.д.).
  # Источник правды: один CSP на host-уровне.

  # www → без www (канонический хост)
  if ($host = www.sl-claw.tech) { return 301 https://sl-claw.tech$request_uri; }

  # Гео /asia/ (ru-KZ) выведено — рынок KZ/UZ переедет на отдельный субдомен.
  # 301 на ru-UA (/n/), чтобы не терять индекс и не плодить 404.
  location ~ ^/asia/(.*)$ { return 301 https://sl-claw.tech/n/$1; }

  # HTML и чистые URL: ревалидировать (без залипания старого HTML)
  # Несуществующие пути → честный 404, а не главная с 200 (фикс soft-404:
  # /demo.html, /about.html, /faq.html и любые фантомные URL больше не дублируют главную)
  location / {
    try_files $uri $uri.html $uri/ =404;
    expires -1;
  }

  # CSS/JS: ревалидировать (без залипания стилей на телефоне)
  location ~* \.(?:css|js)$ { expires -1; }

  # Картинки/шрифты/иконки: кэш надолго (их URL стабильны)
  location ~* \.(?:png|jpe?g|gif|svg|ico|webp|avif|woff2?|ttf|otf)$ { expires 30d; }
}
