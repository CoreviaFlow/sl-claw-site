<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="ttl">Ниша — SL-CLAW</title>
<meta id="desc" name="description" content="Готовый AI-продавец под нишу.">
<link rel="canonical" id="canon" href="https://sl-claw.tech/catalog.html">
<meta property="og:type" content="product">
<meta property="og:title" id="ogt" content="AI-продавец под нишу — SL-CLAW">
<meta property="og:description" id="ogd" content="Готовый AI-продавец под нишу.">
<meta property="og:url" id="ogu" content="https://sl-claw.tech/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="nav"><div class="wrap row">
  <a class="logo" href="index.html">SL<b>_</b>CLAW</a>
  <nav>
    <a href="catalog.html">Каталог ниш</a>
    <a href="pricing.html">Тарифы</a>
    <a href="index.html#how">Как это работает</a>
    <a href="https://token.lux-promo.com" target="_blank" rel="noopener">Кабинет ↗</a>
  </nav>
</div></header>

<div id="page"></div>

<footer class="foot-site"><div class="wrap row">
  <div><span class="logo">SL<b>_</b>CLAW</span> · COREVIA FLOW</div>
  <div class="mono">AI-продавцы под нишу · UK / RU</div>
</div></footer>

<script src="niches.js"></script>
<script src="search.js"></script>
<script>
  const D = window.NICHES, A = D.archetypes;
  const slug = new URLSearchParams(location.search).get('slug');
  const n = D.niches.find(x=>x.slug===slug);
  const page = document.getElementById('page');

  if(!n){
    page.innerHTML = `<section class="wrap" style="padding:80px 0"><h1 class="h2">Ниша не найдена</h1>
      <p class="sub">Проверь ссылку или вернись в <a href="catalog.html" style="color:var(--accent-ink)">каталог</a>.</p></section>`;
  } else {
    document.getElementById('ttl').textContent = `AI-продавец: ${n.name} — SL-CLAW`;
    document.getElementById('desc').setAttribute('content', n.tagline);
    const url = `https://sl-claw.tech/niche.html?slug=${n.slug}`;
    document.getElementById('canon').href = url;
    document.getElementById('ogu').setAttribute('content', url);
    document.getElementById('ogt').setAttribute('content', `AI-продавец: ${n.name} — SL-CLAW`);
    document.getElementById('ogd').setAttribute('content', n.tagline);
    page.innerHTML = `
    <div class="wrap">
      <div class="crumb"><a href="catalog.html">каталог</a> / <span>${n.slug}</span></div>
      <div class="np-head">
        <span class="tag ${n.archetype}">${A[n.archetype]}</span>
        <h1>AI-продавец: ${n.name}</h1>
        <p class="lead">${n.tagline}</p>
        <p class="mono" style="color:var(--ink-faint);font-size:.82rem;margin-top:14px">диалог → квалификация → снятие возражений → <b style="color:var(--accent-ink)">сделка</b> · 24/7 во всех каналах</p>
      </div>
      <div class="np-grid">
        <div class="main">
          <h2>Что умеет бот в этой нише</h2>
          <p class="muted" style="margin:-6px 0 14px;font-size:.92rem">Это полноценный продавец, а не приёмщик заявок: ведёт диалог, квалифицирует и доводит до сделки.</p>
          <ul class="does">${n.does.map(d=>`<li>${d}</li>`).join('')}</ul>

          <h2>Живой пример диалога</h2>
          <div class="chat">
            <div class="hd"><span class="dot"></span> demo · ${n.name}</div>
            <div class="body">
              <div class="msg them">${n.demo.them}</div>
              <div class="msg bot">${n.demo.bot}</div>
            </div>
            <div class="foot"><button class="btn btn-ghost" disabled title="появится после запуска платформы">▶ Попробовать вживую (скоро)</button></div>
          </div>

          <h2 style="margin-top:32px">Цифры рынка ниши</h2>
          <div class="stat-note">// сюда подставляются реальные данные рынка с источниками (объём, ср. чек, конверсия) — этап SEO/GEO-генерации. Без выдуманных цифр.</div>
        </div>

        <aside class="side">
          <div class="box">
            <div class="muted mono" style="font-size:.78rem">тариф</div>
            <div class="price">${n.tier}</div>
            <div class="row2"><span>Тип</span><span>${A[n.archetype]}</span></div>
            <div class="row2"><span>Отрасль</span><span>${n.sector}</span></div>
            <div class="row2"><span>Возможная цель</span><span>${n.cta}</span></div>
            <div class="row2"><span>Репозиторий</span><span class="mono">sl-claw-${n.slug}</span></div>
            <a class="btn btn-primary" style="width:100%;justify-content:center;margin-top:16px" href="pricing.html">Получить бота</a>
            <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:8px" disabled>Demo (скоро)</button>
          </div>
          <div class="box">
            <div class="muted mono" style="font-size:.78rem">развернуть за час</div>
            <div class="deploy"><span class="c">$</span> git clone …/sl-claw-${n.slug}
<span class="c">$</span> cp .env.example .env
<span class="c">$</span> docker compose up -d</div>
          </div>
        </aside>
      </div>
    </div>`;
  }
</script>
</body>
</html>
