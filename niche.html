<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="ttl">Ниша — SL-CLAW</title>
<meta id="desc" name="description" content="Готовый AI-продавец под нишу.">
<link rel="canonical" id="canon" href="https://sl-claw.tech/catalog.html">
<meta property="og:type" content="product">
<meta property="og:title" id="ogt" content="AI-продавец под нишу — SL-CLAW">
<meta property="og:description" id="ogd" content="Готовый AI-продавец под нишу.">
<meta property="og:url" id="ogu" content="https://sl-claw.tech/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="alternate icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="nav"><div class="wrap row">
  <a class="logo" href="index.html">SL<b>_</b>CLAW</a>
  <nav>
    <a href="catalog.html" data-i18n="nav.catalog">Каталог ниш</a>
    <a href="pricing.html" data-i18n="nav.pricing">Тарифы</a>
    <a href="index.html#how" data-i18n="nav.how">Как это работает</a>
    <a href="https://token.lux-promo.com" target="_blank" rel="noopener" data-i18n="nav.cabinet">Кабинет ↗</a>
  </nav>
</div></header>

<div id="page"></div>

<footer class="foot-site"><div class="wrap row">
  <div><span class="logo">SL<b>_</b>CLAW</span> · COREVIA FLOW</div>
  <div class="mono">AI-продавцы под нишу · UK / RU</div>
</div></footer>

<script src="niches.js"></script>
<script src="i18n.js"></script>
<script src="search.js"></script>
<script>
  const D = window.NICHES;
  const slug = new URLSearchParams(location.search).get('slug');
  const n = D.niches.find(x=>x.slug===slug);
  const page = document.getElementById('page');
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  if(!n){
    page.innerHTML = `<section class="wrap" style="padding:80px 0"><h1 class="h2">${LANG==='uk'?'Нішу не знайдено':'Ниша не найдена'}</h1>
      <p class="sub"><a href="catalog.html" style="color:var(--accent-ink)">${LANG==='uk'?'← у каталог':'← в каталог'}</a></p></section>`;
  } else {
    const name = trN(n,'name'), tagline = trN(n,'tagline'), cta = trN(n,'cta');
    const does = trN(n,'does'), demo = trDemo(n), sel = T('demo.seller');
    const depth = (LANG==='uk' && n.uk && n.uk.depth) ? n.uk.depth : (n.depth || {});
    const objs = depth.objections || [], knows = depth.knows || [], market = depth.market || [];
    const pr = (window.PROMO && window.PROMO.prices[n.tier]) || null;
    const promoOn = window.promoActive && window.promoActive();
    const once = LANG==='uk' ? 'одноразово' : 'разово';
    const priceHtml = pr
      ? `<div class="np-price"><span class="now">${promoOn?pr.now:pr.old}</span>${promoOn?`<span class="old">${pr.old}</span><span class="promo-badge">−55%</span>`:''}<div class="small">${n.tier} · ${once}</div></div>`
      : `<div class="price">${n.tier}</div>`;
    const title = `AI-${sel}: ${name} — SL-CLAW`;
    document.getElementById('ttl').textContent = title;
    document.getElementById('desc').setAttribute('content', tagline);
    const url = `https://sl-claw.tech/niche.html?slug=${n.slug}`;
    document.getElementById('canon').href = url;
    document.getElementById('ogu').setAttribute('content', url);
    document.getElementById('ogt').setAttribute('content', title);
    document.getElementById('ogd').setAttribute('content', tagline);

    const pipe = LANG==='uk'
      ? 'діалог → кваліфікація → зняття заперечень → <b style="color:var(--accent-ink)">угода</b> · 24/7 в усіх каналах'
      : 'диалог → квалификация → снятие возражений → <b style="color:var(--accent-ink)">сделка</b> · 24/7 во всех каналах';

    page.innerHTML = `
    <div class="wrap">
      <div class="crumb"><a href="catalog.html">${LANG==='uk'?'каталог':'каталог'}</a> / <span>${n.slug}</span></div>
      <div class="np-head">
        <span class="tag ${n.archetype}">${archLabel(n.archetype)}</span>
        <h1>AI-${sel}: ${esc(name)}</h1>
        <p class="lead">${esc(tagline)}</p>
        <p class="mono" style="color:var(--ink-faint);font-size:.82rem;margin-top:14px">${pipe}</p>
      </div>
      <div class="np-grid">
        <div class="main">
          <h2>${T('niche.does')}</h2>
          <p class="muted" style="margin:-6px 0 14px;font-size:.92rem">${T('niche.fullseller')}</p>
          <ul class="does">${does.map(d=>`<li>${esc(d)}</li>`).join('')}</ul>

          ${objs.length?`<h2>${T('niche.handles')}</h2><div class="chips-row">${objs.map(o=>`<span class="chipx">${esc(o)}</span>`).join('')}</div>`:''}
          ${knows.length?`<h2>${T('niche.knows')}</h2><div class="chips-row">${knows.map(k=>`<span class="chipx soft">${esc(k)}</span>`).join('')}</div>`:''}

          <h2>${T('niche.demo')}</h2>
          <div class="phone"><div class="phone-bezel"><div class="phone-screen">
            <div class="phone-island"></div>
            <div class="phone-top"><span>9:41</span><span class="ic">
              <svg viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
              <svg viewBox="0 0 16 12" fill="currentColor"><path d="M8 2.5c2.3 0 4.4.9 6 2.4l-1.4 1.4A6.6 6.6 0 008 4.4c-1.7 0-3.3.6-4.6 1.9L2 4.9A8.6 8.6 0 018 2.5zM8 6.3c1.3 0 2.5.5 3.4 1.4l-1.4 1.4A3.1 3.1 0 008 8.2c-.8 0-1.5.3-2 .9L4.6 7.7A4.9 4.9 0 018 6.3z"/></svg>
              <svg viewBox="0 0 26 13" fill="none"><rect x="0.6" y="0.6" width="21" height="11.8" rx="3" stroke="currentColor" stroke-opacity="0.8"/><rect x="2" y="2" width="16" height="9" rx="1.5" fill="currentColor"/><rect x="23.2" y="4" width="2" height="5" rx="1" fill="currentColor"/></svg>
            </span></div>
            <div class="phone-head">
              <svg fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
              <span class="pa">A</span>
              <div style="flex:1;min-width:0"><div class="pn">Anna · AI-${sel} ${esc(name)}</div><div class="ps"><span class="live"></span>${T('demo.online')}</div></div>
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.96.36 1.9.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0122 16.92z"/></svg>
            </div>
            <div class="phone-msgs" id="pmsgs"></div>
            <div class="phone-input">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
              <span class="ph">${T('demo.input')}</span>
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4"/></svg>
            </div>
            <div class="phone-home"><i></i></div>
          </div></div></div>

          <h2 style="margin-top:32px">${T('niche.market')}</h2>
          ${market.length?`<div class="stats">${market.map(m=>`<div class="stat"><div class="sv">${esc(m.value)}</div><div class="sl">${esc(m.label)}</div><div class="ss">${esc(m.source)}</div></div>`).join('')}</div>`:`<div class="stat-note">${T('niche.marketnote')}</div>`}
        </div>

        <aside class="side">
          <div class="box">
            <div class="muted mono" style="font-size:.78rem">${promoOn?(LANG==='uk'?'ціна зі знижкою −55%':'цена со скидкой −55%'):'тариф'}</div>
            ${priceHtml}
            <div class="row2"><span>${T('niche.type')}</span><span>${archLabel(n.archetype)}</span></div>
            <div class="row2"><span>${T('niche.sector')}</span><span>${esc(n.sector)}</span></div>
            <div class="row2"><span>${T('niche.target')}</span><span>${esc(cta)}</span></div>
            <div class="row2"><span>${T('niche.repo')}</span><span class="mono">sl-claw-${n.slug}</span></div>
            <a class="btn btn-primary" style="width:100%;justify-content:center;margin-top:16px" href="https://pay.sl-claw.tech/create?niche=${n.slug}&tier=${n.tier}">${T('cta.getbot')}</a>
            <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:8px" disabled>${T('niche.demosoon')}</button>
          </div>
          <div class="box">
            <div class="muted mono" style="font-size:.78rem">${T('niche.deploy')}</div>
            <div class="deploy"><span class="c">$</span> git clone …/sl-claw-${n.slug}
<span class="c">$</span> cp .env.example .env
<span class="c">$</span> docker compose up -d</div>
          </div>
        </aside>
      </div>
    </div>`;

    // ── живой проигрыш диалога (печатается по одному) ──
    const steps=[{who:'bot',text:T('demo.greet'),t:'14:34',ty:true},{who:'them',text:demo.them,t:'14:35 ✓✓'},{who:'bot',text:demo.bot,t:'14:36',ty:true}];
    const box=document.getElementById('pmsgs');
    const wait=ms=>new Promise(r=>setTimeout(r,ms));
    function addRow(who,inner){const r=document.createElement('div');r.className='pm-row '+who+' anim';r.innerHTML=(who==='bot'?'<span class="pm-ava">A</span>':'')+'<div class="pm">'+inner+'</div>';box.appendChild(r);requestAnimationFrame(()=>r.classList.add('show'));box.scrollTop=box.scrollHeight;return r;}
    function addTyping(){const r=document.createElement('div');r.className='pm-row bot anim';r.innerHTML='<span class="pm-ava">A</span><div class="pm"><span class="typing"><i></i><i></i><i></i></span></div>';box.appendChild(r);requestAnimationFrame(()=>r.classList.add('show'));box.scrollTop=box.scrollHeight;return r;}
    let playing=false;
    async function play(){ if(playing) return; playing=true;
      while(true){ box.innerHTML='';
        for(const s of steps){
          if(s.ty){ const tp=addTyping(); await wait(Math.min(1700,Math.max(800,s.text.length*20))); tp.remove(); }
          else { await wait(650); }
          addRow(s.who, esc(s.text)+'<span class="t">'+s.t+'</span>');
          await wait(500);
        }
        await wait(3800);
      }
    }
    const ph=document.querySelector('.phone');
    if(ph && 'IntersectionObserver' in window){ const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){play();io.disconnect();}});}); io.observe(ph); } else { play(); }
  }
</script>
</body>
</html>
